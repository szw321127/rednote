<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RedNote AI Studio</title>

    <!-- Tailwind CDN (keep lightweight, incremental changes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              xhs: {
                red: "#ff2442",
                bg: "#f5f5f7",
                surface: "#ffffff",
                border: "#e5e7eb",
                text: "#111827",
                secondary: "#6b7280",
              },
            },
            boxShadow: {
              soft: "0 1px 2px rgba(17,24,39,0.06), 0 6px 16px rgba(17,24,39,0.06)",
              "soft-md": "0 2px 6px rgba(17,24,39,0.08), 0 12px 30px rgba(17,24,39,0.10)",
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: "0", transform: "translateY(4px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
            animation: {
              "fade-in": "fadeIn 240ms ease-out both",
            },
          },
        },
      };
    </script>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Baseline (fix: previously referenced but missing) -->
    <link rel="stylesheet" href="/index.css" />

    <style>
      body {
        background-color: #f5f5f7;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "react/": "https://aistudiocdn.com/react@^19.2.1/",
          "react": "https://aistudiocdn.com/react@^19.2.1",
          "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
