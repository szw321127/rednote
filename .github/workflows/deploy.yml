# .github/workflows/deploy.yml

name: Build, Push and Deploy to Server

# 触发条件：当 master 分支有 push 操作时
on:
  push:
    branches:
      - master
  workflow_dispatch:  # 允许手动触发

# 设置环境变量
env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository_owner }}/rednote_backend
  FRONTEND_IMAGE_NAME: ${{ github.repository_owner }}/rednote_frontend

jobs:
  # --- 任务1：构建并推送后端 Docker 镜像 ---
  build-and-push-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./rednote-backend
          file: ./rednote-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Backend image digest
        run: echo "${{ steps.meta.outputs.tags }}"

  # --- 任务2：构建并推送前端 Docker 镜像 ---
  build-and-push-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Frontend Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./rednote-ai-studio
          file: ./rednote-ai-studio/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Frontend image digest
        run: echo "${{ steps.meta.outputs.tags }}"

  # --- 任务3：在服务器上部署 ---
  deploy:
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e

            echo "Preparing target directory..."
            TARGET_DIR="${{ secrets.TARGET_DIR }}"

            # Check if TARGET_DIR exists and is a file
            if [ -f "$TARGET_DIR" ]; then
              echo "Error: $TARGET_DIR is a file, not a directory"
              exit 1
            fi

            # Create directory if it doesn't exist
            mkdir -p "$TARGET_DIR" || true
            cd "$TARGET_DIR"

            echo "Creating docker-compose.yml..."
            cat > docker-compose.yml << 'EOF'
            version: '3.8'

            services:
              # Backend Service
              backend:
                image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-szw321127}/rednote_backend:${IMAGE_TAG:-latest}
                container_name: rednote-backend
                restart: unless-stopped
                ports:
                  - "3000:3000"
                environment:
                  - NODE_ENV=production
                  - PORT=3000
                  - TZ=Asia/Shanghai
                  - GOOGLE_API_KEY=${GOOGLE_API_KEY}
                  - OPENAI_API_KEY=${OPENAI_API_KEY}
                  - SESSION_SECRET=${SESSION_SECRET:-rednote-default-secret-key-change-in-production}
                  - CORS_ORIGINS=http://localhost,http://localhost:80,http://frontend
                networks:
                  - rednote-network
                healthcheck:
                  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s

              # Frontend Service
              frontend:
                image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-szw321127}/rednote_frontend:${IMAGE_TAG:-latest}
                container_name: rednote-frontend
                restart: unless-stopped
                ports:
                  - "80:80"
                environment:
                  - TZ=Asia/Shanghai
                depends_on:
                  - backend
                networks:
                  - rednote-network
                healthcheck:
                  test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 5s

            networks:
              rednote-network:
                driver: bridge
            EOF

            echo "Creating .env file with configuration..."
            cat > .env << EOF
            REGISTRY=${{ env.REGISTRY }}
            IMAGE_OWNER=${{ github.repository_owner }}
            IMAGE_TAG=latest
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            EOF

            echo "Logging in to GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            echo "Pulling the latest images..."
            docker compose pull

            echo "Starting services with docker compose..."
            docker compose up -d --remove-orphans

            echo "Cleaning up old images..."
            docker image prune -af

            echo "Deployment successful!"
            docker compose ps
