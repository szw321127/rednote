version: '3.8'

services:
  # Backend Service
  backend:
    # build:
    #   context: ./rednote-backend
    #   dockerfile: Dockerfile
    # 或者使用预构建镜像（取消下面一行的注释，并注释掉上面的 build 部分）
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-szw321127}/rednote_backend:${IMAGE_TAG:-latest}
    container_name: rednote-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Shanghai
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET:-rednote-default-secret-key-change-in-production}
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://frontend
    networks:
      - rednote-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service
  frontend:
    # build:
    #   context: ./rednote-ai-studio
    #   dockerfile: Dockerfile
    # 或者使用预构建镜像（取消下面一行的注释，并注释掉上面的 build 部分）
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-szw321127}/rednote_frontend:${IMAGE_TAG:-latest}
    container_name: rednote-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - backend
    networks:
      - rednote-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  rednote-network:
    driver: bridge
