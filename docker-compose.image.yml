version: '3.8'

services:
  # Backend Service - Using Pre-built Image
  backend:
    image: ghcr.io/szw321127/self_redink:${IMAGE_TAG:-latest}
    container_name: rednote-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Shanghai
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET:-rednote-default-secret-key-change-in-production}
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://frontend
    networks:
      - rednote-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service - Using Pre-built Image
  frontend:
    image: ghcr.io/szw321127/self_redink:${IMAGE_TAG:-latest}
    container_name: rednote-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - backend
    networks:
      - rednote-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  rednote-network:
    driver: bridge
